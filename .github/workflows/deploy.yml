name: Build and Deploy Azure Function

on:
  push:
    branches:
      - main
    paths:
      - "function/**"
  workflow_dispatch:

env:
  DOTNET_VERSION: "9.0.x"
  FUNCTION_APP_PATH: "function/http"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.FUNCTION_APP_PATH }}

      - name: Build
        run: dotnet build ${{ env.FUNCTION_APP_PATH }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.FUNCTION_APP_PATH }} --configuration Release --output ./publish --no-build

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTION_APP_NAME }}
          package: "./publish"
